name: sipeka
description: SIPEKA - Sistem Informasi Pelaporan Kinerja dan Anggaran Kegiatan (UI Prototype)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.2
  # UI Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  file_picker: ^8.1.7
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  lottie: ^3.3.3
  url_launcher: ^6.2.5 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/dinsos_logo.png"